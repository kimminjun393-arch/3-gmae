<!DOCTYPE html>
<html>
<head>
    <title>P2P 실시간 온라인 핑퐁</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #222; color: #fff; text-align: center; font-family: sans-serif; }
        canvas { background: #000; border: 3px solid #fff; }
        .ui { margin: 10px; }
    </style>
</head>
<body>
    <h1>Online Pong (P2P)</h1>
    <div class="ui">
        <p>내 ID: <span id="my-id" style="color: yellow;">연결 중...</span></p>
        <input type="text" id="peer-id" placeholder="상대방 ID 입력">
        <button onclick="connectToPeer()">연결하기</button>
    </div>
    <canvas id="pong" width="600" height="400"></canvas>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");
        let peer, conn;
        let isHost = false;

        // 게임 상태
        const p1 = { y: 150, score: 0 };
        const p2 = { y: 150, score: 0 };
        const ball = { x: 300, y: 200, dx: 4, dy: 4 };

        // 1. Peer 초기화
        peer = new Peer();
        peer.on('open', id => { document.getElementById('my-id').innerText = id; });

        // 2. 누군가 나에게 연결했을 때 (Host가 됨)
        peer.on('connection', c => {
            conn = c;
            isHost = true;
            setupConnection();
        });

        // 3. 내가 남에게 연결할 때 (Guest가 됨)
        function connectToPeer() {
            const peerId = document.getElementById('peer-id').value;
            conn = peer.connect(peerId);
            isHost = false;
            setupConnection();
        }

        function setupConnection() {
            conn.on('data', data => {
                if (isHost) {
                    p2.y = data.y; // 호스트는 게스트의 패들 위치를 받음
                } else {
                    // 게스트는 호스트로부터 전체 게임 상태를 받음
                    p1.y = data.p1y;
                    p2.y = data.p2y;
                    ball.x = data.bx;
                    ball.y = data.by;
                    p1.score = data.s1;
                    p2.score = data.s2;
                }
            });
            gameLoop();
        }

        // 입력 감지
        let myY = 150;
        window.onmousemove = e => {
            const rect = canvas.getBoundingClientRect();
            myY = e.clientY - rect.top - 50;
        };

        function update() {
            if (isHost) {
                p1.y = myY;
                // 공 로직 (호스트만 계산하여 동기화)
                ball.x += ball.dx; ball.y += ball.dy;
                if (ball.y < 0 || ball.y > 400) ball.dy *= -1;
                if (ball.x < 10 && ball.y > p1.y && ball.y < p1.y + 100) ball.dx *= -1;
                if (ball.x > 590 && ball.y > p2.y && ball.y < p2.y + 100) ball.dx *= -1;
                
                // 데이터 전송 (호스트 -> 게스트)
                conn.send({ p1y: p1.y, p2y: p2.y, bx: ball.x, by: ball.y, s1: p1.score, s2: p2.score });
            } else {
                p2.y = myY;
                // 데이터 전송 (게스트 -> 호스트)
                conn.send({ y: p2.y });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 600, 400);
            ctx.fillRect(0, p1.y, 10, 100); // P1 패들
            ctx.fillRect(590, p2.y, 10, 100); // P2 패들
            ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, Math.PI*2); ctx.fill(); // 공
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
